<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>To Chom</title>

<link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Cormorant+Garamond:wght@400;500&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:
    radial-gradient(circle at top,#a48669,#6f5948);
    overflow:auto;
}

/* ===== PHONG THƯ ===== */

#postcard{
    width:760px;
    height:470px;
    background:
    linear-gradient(rgba(255,255,255,.08),
    rgba(255,255,255,.08)),
    repeating-linear-gradient(
      45deg,
      #eadfcf,
      #eadfcf 6px,
      #e3d6c2 6px,
      #e3d6c2 12px
    );
    position:relative;
    box-shadow:0 30px 70px rgba(0,0,0,.35);
    border-radius:8px;
    cursor:pointer;
    animation:sway 4s ease-in-out infinite;
}

@keyframes sway{
    0%{transform:rotate(-2deg);}
    50%{transform:rotate(2deg);}
    100%{transform:rotate(-2deg);}
}

#postcard::before{
    content:"POSTCARD";
    position:absolute;
    left:40px;
    top:35px;
    letter-spacing:8px;
    color:#5b4b3d;
    font-size:34px;
    font-family:'Cormorant Garamond',serif;
}

#divider{
    position:absolute;
    left:50%;
    top:70px;
    width:2px;
    height:320px;
    background:#7d6b58;
}

#address{
    position:absolute;
    right:90px;
    top:140px;
    width:240px;
}

.line{
    height:2px;
    background:#7d6b58;
    margin-bottom:45px;
}

#to{
    position:absolute;
    right:140px;
    top:180px;
    font-family:'Great Vibes',cursive;
    font-size:70px;
    color:#503d2f;
}

/* ===== GIẤY THƯ ===== */

#paper{
    display:none;
    width:900px;
    max-width:95%;
    min-height:950px;
    background:
      linear-gradient(
      rgba(255,255,255,.15),
      rgba(255,255,255,.15)),
      #f5f0e7;
    box-shadow:0 30px 80px rgba(0,0,0,.35);
    border-radius:6px;
    padding:90px;
    position:relative;
}

#paper::before{
    content:"🌷";
    position:absolute;
    top:35px;
    right:45px;
    font-size:35px;
    opacity:.45;
}

#paper::after{
    content:"";
    position:absolute;
    inset:15px;
    border:1px solid rgba(140,120,100,.25);
    pointer-events:none;
}

/* ===== CHỮ ===== */

#text{
    white-space:pre-line;
    font-family:'Great Vibes',cursive;
    color:#4d3b2f;
    font-size:34px;
    line-height:2;
}

#gift{
    display:none;
    width:340px;
    margin-top:60px;
    border-radius:18px;
    box-shadow:0 10px 30px rgba(0,0,0,.2);
}

.center{
    text-align:center;
}

</style>
</head>

<body>

<div id="postcard">

    <div id="divider"></div>

    <div id="address">
        <div class="line"></div>
        <div class="line"></div>
        <div class="line"></div>
    </div>

    <div id="to">To Chom</div>

</div>

<div id="paper">

<div id="text"></div>

<div class="center">
    <img src="voucher.jpg" id="gift">
</div>

</div>

<script>

const message = `❀ Thân gửi: Hoàng thượng

Hoàng thượng ơi,

Nhận thấy Hoàng thượng làm việc chăm chỉ và bị em bào quá chừng,
em xin kính cẩn nghiêng mình dâng lên Hoàng thượng món quà nhỏ của em.

Mong Hoàng thượng nhận món quà này
với một nụ cười thật tươi nhé! ☺️

Và hãy nhớ chăm chỉ làm việc hơn...

để còn dẫn em đi ăn nhé! 😜


Credit:

"Đổi một lần uống nước
bằng một lần ăn vú nướng đấy nhé!

Deal xịn đấy!"


Ký tên,

Cô gái tẻn nhất anh từng gặp 🐾`;

document.getElementById("postcard").onclick = function(){

    document.getElementById("postcard").style.display = "none";
    document.getElementById("paper").style.display = "block";

    let i = 0;
    const txt = document.getElementById("text");

    function typing(){

        if(i < message.length){

            txt.innerHTML += message.charAt(i);
            i++;

            setTimeout(typing,40);

        }else{

            document.getElementById("gift").style.display = "block";

        }
    }

    typing();
};

</script>

</body>
</html>
