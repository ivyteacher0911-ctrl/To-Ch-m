<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>To Chom</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;1,400&family=Dancing+Script:wght@400;500&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:
    radial-gradient(circle at top,#b79a7c,#7a6553);
    font-family:'Cormorant Garamond',serif;
    overflow:auto;
}

/* BƯU THIẾP */

#postcard{
    width:720px;
    height:450px;
    background:
    linear-gradient(rgba(255,255,255,.08),
    rgba(255,255,255,.08)),
    repeating-linear-gradient(
    45deg,
    #e5d6bf,
    #e5d6bf 4px,
    #e0d0b8 4px,
    #e0d0b8 8px);
    border-radius:8px;
    box-shadow:0 25px 60px rgba(0,0,0,.35);
    position:relative;
    cursor:pointer;
    animation:sway 4s ease-in-out infinite;
}

@keyframes sway{
    0%{transform:rotate(-2deg);}
    50%{transform:rotate(2deg);}
    100%{transform:rotate(-2deg);}
}

#postcard::before{
    content:"POSTCARD";
    position:absolute;
    left:35px;
    top:35px;
    letter-spacing:8px;
    font-size:35px;
    color:#5f4c3d;
}

#postcard::after{
    content:"";
    position:absolute;
    right:85px;
    top:140px;
    width:230px;
    height:2px;
    background:#7a6653;
    box-shadow:
      0 55px #7a6653,
      0 110px #7a6653,
      0 165px #7a6653;
}

#divider{
    position:absolute;
    left:50%;
    top:70px;
    width:2px;
    height:300px;
    background:#7a6653;
}

#to{
    position:absolute;
    right:120px;
    top:170px;
    font-size:50px;
    font-style:italic;
    color:#4d3c2d;
    font-family:'Dancing Script',cursive;
}

/* GIẤY THƯ */

#paper{
    display:none;
    width:900px;
    max-width:95%;
    min-height:900px;
    background:
    repeating-linear-gradient(
      to bottom,
      rgba(0,0,0,0) 0,
      rgba(0,0,0,0) 45px,
      rgba(120,100,80,.15) 46px
    ),
    linear-gradient(#f5efdf,#eee3ce);
    padding:90px;
    box-shadow:0 25px 60px rgba(0,0,0,.35);
    border-radius:8px;
    color:#4d3d30;
}

#text{
    white-space:pre-line;
    font-size:34px;
    line-height:46px;
    font-style:italic;
    font-family:'Cormorant Garamond',serif;
}

#gift{
    display:none;
    width:330px;
    margin-top:60px;
    border-radius:15px;
}

.center{
    text-align:center;
}

.tulip{
    color:#8a6f5a;
    font-size:38px;
}

</style>
</head>

<body>

<div id="postcard">
    <div id="divider"></div>
    <div id="to">To Chom</div>
</div>

<div id="paper">

<div id="text"></div>

<div class="center">
    <img src="voucher.jpg" id="gift">
</div>

</div>

<script>

const message = `❀

Thân gửi: Hoàng thượng

Hoàng thượng ơi,

Nhận thấy Hoàng thượng làm việc chăm chỉ và bị em bào quá chừng,
em xin kính cẩn nghiêng mình dâng lên Hoàng thượng món quà nhỏ của em.

Mong Hoàng thượng nhận món quà này
với một nụ cười thật tươi nhé! ☺️

Và hãy nhớ chăm chỉ làm việc hơn...

để còn dẫn em đi ăn nhé! 😜

༄

Credit:

"Đổi một lần uống nước bằng một lần ăn vú nướng đấy nhé!

Deal xịn đấy!"

🌷

Ký tên,

Cô gái tẻn nhất anh từng gặp

❀`;

document.getElementById("postcard").onclick = function(){

    document.getElementById("postcard").style.display = "none";
    document.getElementById("paper").style.display = "block";

    let i = 0;

    function typing(){

        if(i < message.length){

            document.getElementById("text").innerHTML += message.charAt(i);

            i++;

            setTimeout(typing,35);

        }else{

            document.getElementById("gift").style.display = "block";

        }
    }

    typing();
}

</script>

</body>
</html>
